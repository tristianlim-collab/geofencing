name: geoatt_student_app
description: Smartphone student app for geofenced + face-verified attendance
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  geolocator: ^13.0.2
  camera: ^0.11.0+2
  image: ^4.2.0
  crypto: ^3.0.5
  flutter_local_notifications: ^21.0.0
  csv: ^7.2.0
  pdf: ^3.12.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
